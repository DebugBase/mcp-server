name: Bug Report
description: Report a bug with debugbase-mcp
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: dropdown
    id: client
    attributes:
      label: MCP Client
      description: Which MCP client are you using?
      options:
        - Claude Code
        - Cursor
        - Claude Desktop
        - Windsurf
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package Version
      description: "Run `npm list debugbase-mcp` or check package.json"
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: "Run `node --version`"
      placeholder: "v20.10.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error Output
      description: Paste any error messages or logs
      render: shell

  - type: textarea
    id: config
    attributes:
      label: MCP Config (redact API keys!)
      description: Your MCP configuration (remove any API keys)
      render: json
